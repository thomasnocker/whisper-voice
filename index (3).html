<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Voice</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #444444;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #ffffff;
      --muted: #cccccc;
      --danger: #ff4444;
      --recording: #ff2d55;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232,255,71,0.05) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: all 0.5s ease;
    }

    body.recording::after {
      background: radial-gradient(circle, rgba(255,45,85,0.12) 0%, transparent 70%);
      animation: pulse-bg 1.5s ease-in-out infinite;
    }

    @keyframes pulse-bg {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
    }

    .container {
      width: 100%;
      max-width: 680px;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .title-block h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      color: var(--text);
    }

    .title-block h1 span {
      color: var(--accent);
    }

    .title-block p {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px;
    }

    .settings-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .settings-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Settings panel */
    .settings-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      display: none;
      animation: slideDown 0.2s ease;
    }

    .settings-panel.open { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .settings-panel label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .settings-panel input, .settings-panel select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .settings-panel input:focus, .settings-panel select:focus {
      border-color: var(--accent);
    }

    .settings-panel select option { background: var(--surface2); }

    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .save-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .save-btn:hover { background: #d4eb3a; }

    /* Main record button */
    .record-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .record-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      outline: none;
    }

    .record-btn::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(232,255,71,0.15);
      transition: all 0.3s;
    }

    .record-btn:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .record-btn:hover::before {
      inset: -16px;
      opacity: 0.5;
    }

    .record-btn.active {
      background: rgba(255,45,85,0.1);
      border-color: var(--recording);
      animation: pulse-ring 1.5s ease-in-out infinite;
    }

    .record-btn.active::before {
      border-color: rgba(255,45,85,0.3);
      animation: pulse-ring-outer 1.5s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,85,0.3); }
      50% { box-shadow: 0 0 0 20px rgba(255,45,85,0); }
    }

    @keyframes pulse-ring-outer {
      0%, 100% { inset: -12px; opacity: 0.3; }
      50% { inset: -24px; opacity: 0; }
    }

    .mic-icon {
      width: 40px;
      height: 40px;
      color: var(--muted);
      transition: color 0.3s;
    }

    .record-btn:hover .mic-icon { color: var(--accent); }
    .record-btn.active .mic-icon { color: var(--recording); }
    .record-btn.processing .mic-icon { color: var(--accent); }

    .record-btn.processing {
      border-color: var(--accent);
      animation: spin-glow 1s linear infinite;
    }

    @keyframes spin-glow {
      0% { box-shadow: 0 0 20px rgba(232,255,71,0.2); }
      50% { box-shadow: 0 0 40px rgba(232,255,71,0.4); }
      100% { box-shadow: 0 0 20px rgba(232,255,71,0.2); }
    }

    .record-status {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      height: 18px;
      transition: color 0.3s;
    }

    .record-status.active { color: var(--recording); }
    .record-status.processing { color: var(--accent); }

    /* Waveform visualizer */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 32px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .waveform.active { opacity: 1; }

    .wave-bar {
      width: 3px;
      height: 4px;
      background: var(--recording);
      border-radius: 2px;
      transition: height 0.1s;
    }

    .waveform.active .wave-bar {
      animation: wave 0.8s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.15s; }
    .wave-bar:nth-child(6) { animation-delay: 0.05s; }
    .wave-bar:nth-child(7) { animation-delay: 0.25s; }
    .wave-bar:nth-child(8) { animation-delay: 0.35s; }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 24px; }
    }

    /* Output area */
    .output-wrapper {
      position: relative;
    }

    .output-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .char-count {
      color: #aaaaaa;
      transition: color 0.3s;
    }

    .char-count.has-text { color: var(--muted); }

    .output-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 140px;
      font-size: 16px;
      line-height: 1.7;
      font-family: 'Syne', sans-serif;
      font-weight: 300;
      color: var(--text);
      outline: none;
      resize: none;
      width: 100%;
      transition: border-color 0.3s;
      position: relative;
    }

    .output-box:focus { border-color: var(--accent); }

    .placeholder-text {
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 300;
      pointer-events: none;
      transition: opacity 0.3s;
      line-height: 1.7;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .action-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .action-btn.primary:hover {
      background: #d4eb3a;
      border-color: #d4eb3a;
    }

    .action-btn.success {
      background: rgba(100,220,100,0.1);
      border-color: #64dc64;
      color: #64dc64;
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* History */
    .history-section {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .history-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 180px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-weight: 300;
    }

    .history-item:hover {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .history-time {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .history-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Error state */
    .error-msg {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      color: #ff8888;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      margin-top: 12px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* Keyboard hint */
    .kb-hint {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: #aaaaaa;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="title-block">
        <h1>Whisper<span>.</span></h1>
        <p>VOICE → TEXT // SELF-HOSTED</p>
      </div>
      <button class="settings-btn" onclick="toggleSettings()">⚙ Config</button>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
      <label>Server URL</label>
      <input type="text" id="serverUrl" placeholder="https://whisper.deinedomain.de" />

      <div class="settings-row">
        <div>
          <label>Modell</label>
          <select id="model">
            <option value="base">base (schnell)</option>
            <option value="small">small (besser)</option>
            <option value="medium">medium (genau)</option>
            <option value="large">large (sehr genau)</option>
          </select>
        </div>
        <div>
          <label>Sprache</label>
          <select id="language">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="auto">Auto-Detect</option>
          </select>
        </div>
      </div>

      <button class="save-btn" onclick="saveSettings()">Speichern</button>
    </div>

    <!-- Record Section -->
    <div class="record-section">
      <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path id="micPath" d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <div class="waveform" id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>

      <div class="record-status" id="recordStatus">KLICKEN ZUM AUFNEHMEN</div>
      <div class="kb-hint">oder <kbd>Leertaste</kbd> halten</div>
    </div>

    <!-- Output -->
    <div class="output-wrapper">
      <div class="output-label">
        <span>Transkription</span>
        <span class="char-count" id="charCount">0 Zeichen</span>
      </div>
      <div style="position:relative">
        <textarea class="output-box" id="outputBox" oninput="onOutputChange()" onkeydown="handleTextareaKey(event)"></textarea>
        <div class="placeholder-text" id="placeholder">Sprachaufnahme starten...</div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="actions">
      <button class="action-btn" id="clearBtn" onclick="clearOutput()" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Löschen
      </button>
      <button class="action-btn primary" id="copyBtn" onclick="copyText()" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Kopieren
      </button>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display:none">
      <div class="history-label">Verlauf</div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- State ---
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let isProcessing = false;
    let spaceHeld = false;
    let history = [];

    const settings = {
      serverUrl: localStorage.getItem('whisper_url') || 'https://sprech.autmi.de',
      model: localStorage.getItem('whisper_model') || 'base',
      language: localStorage.getItem('whisper_lang') || 'de'
    };

    // --- Init ---
    function init() {
      document.getElementById('serverUrl').value = settings.serverUrl;
      document.getElementById('model').value = settings.model;
      document.getElementById('language').value = settings.language;

      // Spacebar push-to-talk
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !e.target.matches('textarea, input') && !spaceHeld) {
          e.preventDefault();
          spaceHeld = true;
          if (!isRecording && !isProcessing) startRecording();
        }
      });

      document.addEventListener('keyup', (e) => {
        if (e.code === 'Space' && !e.target.matches('textarea, input')) {
          spaceHeld = false;
          if (isRecording) stopRecording();
        }
      });
    }

    // --- Settings ---
    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('open');
    }

    function saveSettings() {
      settings.serverUrl = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
      settings.model = document.getElementById('model').value;
      settings.language = document.getElementById('language').value;

      localStorage.setItem('whisper_url', settings.serverUrl);
      localStorage.setItem('whisper_model', settings.model);
      localStorage.setItem('whisper_lang', settings.language);

      document.getElementById('settingsPanel').classList.remove('open');
      showToast('Einstellungen gespeichert');
    }

    // --- Recording ---
    async function toggleRecording() {
      if (isProcessing) return;
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      if (!settings.serverUrl) {
        showError('Bitte zuerst die Server-URL in den Einstellungen eintragen.');
        toggleSettings();
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          await transcribe();
        };

        mediaRecorder.start();
        isRecording = true;
        setRecordingState(true);
        hideError();

      } catch (err) {
        showError('Mikrofon-Zugriff verweigert. Bitte im Browser erlauben.');
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        setProcessingState(true);
      }
    }

    // --- Transcription ---
    async function transcribe() {
      if (audioChunks.length === 0) {
        setProcessingState(false);
        return;
      }

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const formData = new FormData();
      formData.append('audio_file', blob, 'recording.webm');

      const lang = settings.language === 'auto' ? '' : `?language=${settings.language}&task=transcribe`;
      const url = `${settings.serverUrl}/asr${lang}`;

      try {
        const response = await fetch(url, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error(`Server Error: ${response.status}`);

        const text = await response.text();
        const cleaned = text.trim().replace(/^"|"$/g, '');

        if (cleaned) {
          appendText(cleaned);
          addToHistory(cleaned);
        }
        hideError();

      } catch (err) {
        showError(`Verbindung fehlgeschlagen: ${err.message}`);
      } finally {
        setProcessingState(false);
      }
    }

    // --- UI State ---
    function setRecordingState(active) {
      const btn = document.getElementById('recordBtn');
      const status = document.getElementById('recordStatus');
      const waveform = document.getElementById('waveform');

      btn.className = 'record-btn' + (active ? ' active' : '');
      status.className = 'record-status' + (active ? ' active' : '');
      status.textContent = active ? 'AUFNAHME LÄUFT...' : 'KLICKEN ZUM AUFNEHMEN';
      waveform.className = 'waveform' + (active ? ' active' : '');

      if (active) {
        document.body.classList.add('recording');
      } else {
        document.body.classList.remove('recording');
      }
    }

    function setProcessingState(active) {
      isProcessing = active;
      const btn = document.getElementById('recordBtn');
      const status = document.getElementById('recordStatus');

      btn.className = 'record-btn' + (active ? ' processing' : '');
      status.className = 'record-status' + (active ? ' processing' : '');
      status.textContent = active ? 'TRANSKRIBIERE...' : 'KLICKEN ZUM AUFNEHMEN';

      document.getElementById('waveform').className = 'waveform';
      document.body.classList.remove('recording');
    }

    // --- Text Output ---
    function appendText(text) {
      const box = document.getElementById('outputBox');
      const current = box.value;
      box.value = current ? current + ' ' + text : text;
      onOutputChange();

      // Auto-copy if checkbox active (optional future feature)
      showToast('✓ Transkribiert');
    }

    function onOutputChange() {
      const box = document.getElementById('outputBox');
      const hasText = box.value.length > 0;

      document.getElementById('placeholder').style.opacity = hasText ? '0' : '1';
      document.getElementById('charCount').textContent = box.value.length + ' Zeichen';
      document.getElementById('charCount').className = 'char-count' + (hasText ? ' has-text' : '');
      document.getElementById('copyBtn').disabled = !hasText;
      document.getElementById('clearBtn').disabled = !hasText;
    }

    function handleTextareaKey(e) {
      if (e.code === 'Space') e.stopPropagation();
    }

    function clearOutput() {
      document.getElementById('outputBox').value = '';
      onOutputChange();
    }

    async function copyText() {
      const text = document.getElementById('outputBox').value;
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('copyBtn');
        btn.className = 'action-btn success';
        btn.innerHTML = '✓ Kopiert!';
        showToast('In Zwischenablage kopiert');
        setTimeout(() => {
          btn.className = 'action-btn primary';
          btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Kopieren';
        }, 2000);
      } catch {
        showError('Kopieren fehlgeschlagen. Bitte manuell markieren und Strg+C.');
      }
    }

    // --- History ---
    function addToHistory(text) {
      const now = new Date();
      const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      history.unshift({ text, time });
      if (history.length > 10) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');

      if (history.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = '';

      history.forEach(item => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `<span class="history-time">${item.time}</span><span class="history-text">${item.text}</span>`;
        el.onclick = () => {
          const box = document.getElementById('outputBox');
          const current = box.value;
          box.value = current ? current + ' ' + item.text : item.text;
          onOutputChange();
          showToast('Aus Verlauf eingefügt');
        };
        list.appendChild(el);
      });
    }

    // --- Helpers ---
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.className = 'error-msg show';
    }

    function hideError() {
      document.getElementById('errorMsg').className = 'error-msg';
    }

    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
